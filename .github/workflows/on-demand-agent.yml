name: On-Demand Agent Execution

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to run'
        required: true
        type: choice
        options:
          - builder
          - tester
          - designer
          - planner
          - supervisor
      max_issues:
        description: 'Maximum issues to process'
        required: false
        default: '5'
        type: string
      parallel:
        description: 'Enable parallel issue processing'
        required: false
        default: true
        type: boolean
      max_concurrent:
        description: 'Maximum concurrent issues'
        required: false
        default: '3'
        type: string
      target_repo:
        description: 'Target repo (e.g., qltechin/app)'
        required: false
        type: string
      issue_number:
        description: 'Specific issue number to process'
        required: false
        type: string
      target_pr:
        description: 'PR number (for tester/designer agents)'
        required: false
        type: string
      comment:
        description: 'Comment text to apply to existing PR (builder iterate mode — requires issue_number + target_repo)'
        required: false
        type: string
      dry_run:
        description: 'Run without making changes'
        required: false
        default: 'false'
        type: boolean
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'true'
        type: boolean
      staging:
        description: 'Use staging environment'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.staging && 'staging' || github.ref }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ vars.GH_OWNER }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Install GitHub CLI
        run: |
          type -p gh > /dev/null || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg &&
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null &&
            sudo apt update && sudo apt install gh -y
          )
          gh --version

      - name: Install Codex CLI
        if: inputs.agent == 'builder'
        run: |
          npm install -g @openai/codex
          codex --version || echo "codex installed"

      - name: Configure git identity
        run: |
          git config --global user.email "ai-agents@qltechin.github.io"
          git config --global user.name "AI Agents"
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Run Agent
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_OWNER: ${{ vars.GH_OWNER }}
          GH_ACCOUNT_TYPE: ${{ vars.GH_ACCOUNT_TYPE }}
          GH_PROJECT_NUMBER: ${{ vars.GH_PROJECT_NUMBER }}
          MONITORED_REPOS: ${{ vars.MONITORED_REPOS }}
          GH_AGENTS_REPO_NAME: ${{ vars.GH_AGENTS_REPO_NAME }}
          BUILDER_REPOS: ${{ vars.MONITORED_REPOS }}
          # Code agent provider: set CODE_AGENT_PROVIDER var to claude/deepseek/codex/auto
          CODE_AGENT_PROVIDER: ${{ vars.CODE_AGENT_PROVIDER || 'auto' }}
          # API keys — enable the ones you want to use
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          VERBOSE: ${{ inputs.verbose && 'true' || 'false' }}
          STAGING: ${{ inputs.staging && 'true' || 'false' }}
          ISSUE_COMMENT: ${{ inputs.comment }}
        run: |
          ARGS="--max-issues ${{ inputs.max_issues || '5' }}"

          if [ "${{ inputs.parallel }}" = "true" ]; then
            ARGS="$ARGS --parallel --max-concurrent ${{ inputs.max_concurrent || '3' }}"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "$VERBOSE" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi

          if [ -n "${{ inputs.target_repo }}" ]; then
            ARGS="$ARGS --target-repo ${{ inputs.target_repo }}"
          fi

          if [ -n "${{ inputs.issue_number }}" ]; then
            ARGS="$ARGS --issue-number ${{ inputs.issue_number }}"
          fi

          if [ -n "${{ inputs.target_pr }}" ]; then
            ARGS="$ARGS --pr ${{ inputs.target_pr }}"
          fi

          echo "Running: python -m cli.main ${{ inputs.agent }} $ARGS"
          set -o pipefail
          if [ -n "$ISSUE_COMMENT" ]; then
            python -m cli.main ${{ inputs.agent }} $ARGS --comment "$ISSUE_COMMENT" 2>&1 | tee /tmp/agent_output.log
          else
            python -m cli.main ${{ inputs.agent }} $ARGS 2>&1 | tee /tmp/agent_output.log
          fi

      - name: Summary
        if: always()
        env:
          ISSUE_COMMENT: ${{ inputs.comment }}
        run: |
          LOG=/tmp/agent_output.log

          # --- Determine run status ---
          if grep -qiE "PR updated successfully|PR created:|Fixed [0-9]+ error|Processed [0-9]+ issue" "$LOG" 2>/dev/null; then
            STATUS="✅ Success"
          elif grep -qiE "\[ERROR\]|Error:|exit code 1" "$LOG" 2>/dev/null; then
            STATUS="❌ Failed"
          else
            STATUS="⚠️ Unknown"
          fi

          # --- Determine mode ---
          if [ -n "$ISSUE_COMMENT" ]; then
            MODE="PR Iteration"
          elif [ -n "${{ inputs.target_pr }}" ]; then
            MODE="Lint Fix"
          else
            MODE="Issue Processing"
          fi

          # --- Extract PR URL(s) from agent output ---
          PR_URLS=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' "$LOG" 2>/dev/null | sort -u || true)

          # --- Extract files changed ---
          FILES_LINE=$(grep "Files changed:" "$LOG" 2>/dev/null | tail -1 | sed 's/.*Files changed: //' || true)

          # --- Extract issues processed ---
          PROCESSED_LINE=$(grep -E "Processed [0-9]+ issue" "$LOG" 2>/dev/null | tail -1 || true)

          # --- Extract error count (lint-fix) ---
          FIXED_LINE=$(grep -E "Fixed [0-9]+ error" "$LOG" 2>/dev/null | tail -1 || true)

          # --- Extract any [ERROR] or [WARNING] lines ---
          ERROR_LINES=$(grep -E "\[ERROR\]|\[WARNING\]" "$LOG" 2>/dev/null | tail -5 || true)

          # --- Write summary ---
          {
            echo "## Agent Execution Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Status | $STATUS |"
            echo "| Agent | ${{ inputs.agent }} |"
            echo "| Mode | $MODE |"
            echo "| Target Repo | ${{ inputs.target_repo || 'all monitored repos' }} |"
            [ -n "${{ inputs.issue_number }}" ] && echo "| Issue | [#${{ inputs.issue_number }}](https://github.com/${{ inputs.target_repo }}/issues/${{ inputs.issue_number }}) |"
            [ -n "${{ inputs.target_pr }}" ]   && echo "| Target PR | [#${{ inputs.target_pr }}](https://github.com/${{ inputs.target_repo }}/pull/${{ inputs.target_pr }}) |"
            echo "| Dry Run | ${{ inputs.dry_run }} |"
            echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo ""

            # PR links
            if [ -n "$PR_URLS" ]; then
              echo "### 🔗 PR(s) Created / Updated"
              while IFS= read -r url; do
                echo "- $url"
              done <<< "$PR_URLS"
              echo ""
            fi

            # Files changed
            if [ -n "$FILES_LINE" ]; then
              echo "### 📝 Files Changed"
              echo "$FILES_LINE" | tr ',' '\n' | sed 's/^ */- /'
              echo ""
            fi

            # Processed / fixed summary line
            if [ -n "$PROCESSED_LINE" ]; then
              echo "### 📋 Result"
              echo "$PROCESSED_LINE"
              echo ""
            fi
            if [ -n "$FIXED_LINE" ]; then
              echo "### 🔧 Lint Fix Result"
              echo "$FIXED_LINE"
              echo ""
            fi

            # Feedback snippet (iterate mode)
            if [ -n "$ISSUE_COMMENT" ]; then
              echo "### 💬 Feedback Applied"
              printf '> %s\n' "${ISSUE_COMMENT:0:300}"
              echo ""
            fi

            # Errors / warnings
            if [ -n "$ERROR_LINES" ]; then
              echo "### ⚠️ Errors / Warnings"
              echo '```'
              echo "$ERROR_LINES"
              echo '```'
              echo ""
            fi

            echo "### 🔍 Log Search Tips"
            echo "Search the **Run Agent** step output for:"
            echo '- `[ITERATE]` — PR iteration progress'
            echo '- `[LINT-FIX]` — lint fix progress'
            echo '- `[ANALYZE]` — flutter analyze output'
            echo '- `[ERROR]` — failures'
          } >> $GITHUB_STEP_SUMMARY
